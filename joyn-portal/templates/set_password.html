<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password — Joyn Client Portal</title>
<link rel="icon" type="image/svg+xml" href="https://tryjoyn.me/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --white:#fafaf8; --ink:#111110; --ink-secondary:#3f3f3e;
  --rule:#e8e4dc; --rule-mid:#d0ccc4; --surface:#f4f1eb;
  --gold-display:#b8902a; --gold-text:#8B6914; --gold-hover:#7a5c10;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--white);color:var(--ink);font-family:'Syne',sans-serif;font-size:1rem;line-height:1.8;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:400;color:var(--ink)}
p{color:var(--ink-secondary)}
.header{padding:2rem clamp(1.5rem,5vw,4rem);border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center}
.header-logo{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:500;letter-spacing:.1em;color:var(--ink);text-decoration:none}
.header-tagline{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-secondary)}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(3rem,6vw,6rem) clamp(1.5rem,5vw,4rem)}
.login-panel{width:100%;max-width:440px}
.gold-rule{width:2.5rem;height:1px;background:var(--gold-display);margin-bottom:1.75rem}
.login-label{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-text);display:inline-flex;align-items:center;gap:.65rem;margin-bottom:.75rem}
.login-label::before{content:'';display:block;width:1.5rem;height:1px;background:var(--gold-text)}
.login-heading{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,5vw,3.5rem);font-weight:300;line-height:1.1;color:var(--ink);margin-bottom:.5rem}
.login-sub{font-size:.9rem;color:var(--ink-secondary);line-height:1.7;margin-bottom:2.5rem}
.form-field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.25rem}
.form-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-secondary)}
.form-input{font-family:'Syne',sans-serif;font-size:.95rem;padding:.75rem 1rem;border:1px solid var(--rule-mid);background:var(--white);color:var(--ink);outline:none;transition:border-color .15s;-webkit-appearance:none;width:100%}
.form-input:focus{border-color:var(--ink)}
.form-input::placeholder{color:var(--rule-mid)}
.btn-primary{display:block;width:100%;font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:.875rem 2rem;background:var(--ink);color:var(--white);border:1px solid var(--ink);transition:background .2s,color .2s;cursor:pointer;margin-top:.5rem}
.btn-primary:hover{background:var(--white);color:var(--ink)}
.form-error{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.06em;color:var(--ink-secondary);border:1px solid var(--rule-mid);background:var(--surface);padding:.75rem 1rem;margin-bottom:1.25rem}
.hint{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;color:var(--ink-secondary);margin-top:.35rem}
.page-footer{padding:1.5rem clamp(1.5rem,5vw,4rem);border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center}
.page-footer-copy{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-secondary)}
</style>
</head>
<body>

<header class="header">
  <a href="https://tryjoyn.me" class="header-logo">JOYN.</a>
  <span class="header-tagline">Client Portal</span>
</header>

<div class="login-wrap">
  <div class="login-panel">
    <div class="gold-rule"></div>
    <span class="login-label">First Sign In</span>
    <h1 class="login-heading">Set your password.</h1>
    <p class="login-sub">Choose a permanent password before accessing your portal.</p>

    {% if error %}
    <div class="form-error">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('auth.set_password_post') }}" method="post">
      <div class="form-field">
        <label class="form-label" for="new_password">New password</label>
        <input class="form-input" type="password" id="new_password" name="new_password"
               placeholder="••••••••••••" autocomplete="new-password" required minlength="12">
        <span class="hint">Minimum 12 characters</span>
      </div>
      <div class="form-field">
        <label class="form-label" for="confirm_password">Confirm password</label>
        <input class="form-input" type="password" id="confirm_password" name="confirm_password"
               placeholder="••••••••••••" autocomplete="new-password" required minlength="12">
      </div>
      <button type="submit" class="btn-primary">Set password &amp; continue →</button>
    </form>
  </div>
</div>

<footer class="page-footer">
  <span class="page-footer-copy">Joyn &middot; tryjoyn.me</span>
  <span class="page-footer-copy">We Staff Your Business With AI.</span>
</footer>

</body>
</html>
